# Jekyll configuration for GitHub Pages
#
# This config is deliberately minimal. It enables GitHub's default theme
# (clean, no-frills markdown rendering) without pulling in heavy plugins.
# If you want to switch themes later, change `theme:` below. For the full
# list of GitHub-Pages-supported themes:
# https://pages.github.com/themes/

title: AI Chat Archive — Docs
description: >-
  Documentation for AI Chat Archive — a Chrome extension that exports Claude.ai
  conversations to PDF, HTML, or Markdown, entirely in your browser.
url: https://docs.aichatarchive.app
baseurl: ""

# Default theme. `minima` is GitHub Pages' built-in minimalist theme.
theme: minima

# Author shown in footer / RSS.
author:
  name: AI Chat Archive team
  url: https://aichatarchive.app

# SEO & social metadata
twitter:
  username: aichatarchive
social:
  name: AI Chat Archive
  links:
    - https://aichatarchive.app
    - https://github.com/windameister/ai-chat-archive-docs

# Serve llms.txt and llms-full.txt as-is (don't let Jekyll try to parse them)
include:
  - llms.txt
  - llms-full.txt
  - CNAME

# Don't render these in the built site
exclude:
  - CONTRIBUTING.md
  - LICENSE
  - README.md   # README is rendered on GitHub; the Pages home uses index.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore
  - node_modules/

# Let absolute paths resolve cleanly
permalink: /:path/

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
highlighter: rouge

# Plugins supported by GitHub Pages
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
